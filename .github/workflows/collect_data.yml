name: 농업 데이터 수집

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: |
          pip install -r backend/requirements.txt

      - name: Firebase 키 파일 생성
        run: |
          echo '${{ secrets.FIREBASE_KEY }}' > backend/firebase_key.json

      - name: 환경변수 설정
        run: |
          echo "FARMMAP_WEATHER_API_KEY=${{ secrets.FARMMAP_WEATHER_API_KEY }}" >> backend/.env
          echo "FARMMAP_SOIL_API_KEY=${{ secrets.FARMMAP_SOIL_API_KEY }}" >> backend/.env
          echo "FARMMAP_PEST_API_KEY=${{ secrets.FARMMAP_PEST_API_KEY }}" >> backend/.env
          echo "FIREBASE_KEY_PATH=firebase_key.json" >> backend/.env

      - name: 데이터 수집 실행
        run: |
          cd backend
          python scripts/collect_data.py